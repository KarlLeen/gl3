<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glory v3</title>
  </head>
  <body style="margin: 0; background: #020617;">
    <div id="root"></div>

    <!-- React 18 UMD builds (global React / ReactDOM) -->
    <script
      crossorigin
      src="https://unpkg.com/react@18/umd/react.production.min.js"
    ></script>
    <script
      crossorigin
      src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"
    ></script>

    <!-- Babel in-browser JSX transform -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Main component (transformed by Babel because type="text/babel") -->
    <script type="text/babel" src="./GloryV3.jsx"></script>

    <script type="text/babel">
      const el = document.getElementById("root");
      const App = window.GloryApp;

      if (ReactDOM.createRoot) {
        const root = ReactDOM.createRoot(el);
        root.render(<App />);
      } else if (ReactDOM.render) {
        ReactDOM.render(<App />, el);
      } else {
        el.textContent = "ReactDOM not found";
      }
    </script>
  </body>
</html>
